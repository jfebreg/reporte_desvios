services:
  - type: web
    name: reporte-desvios-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: APP_ORIGIN
        value: https://jfebreg.github.io
      - key: API_TOKEN
        generateValue: true
      - key: AUTO_IMPORT_MINUTES
        value: "15"
      - key: AUTO_REMINDER_MINUTES
        value: "1440"
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: reporte-desvios-db
          property: connectionString
      - key: GOOGLE_SHEET_RANGE
        value: Respuestas de formulario 1!A:Z
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
      - key: GOOGLE_DRIVE_EVIDENCE_FOLDER_ID
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: MAIL_FROM
        value: prevencion@empresa.cl

databases:
  - name: reporte-desvios-db
    plan: free
