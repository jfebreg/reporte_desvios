services:
  - type: web
    name: reporte-desvios-api
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: APP_ORIGIN
        value: https://jfebreg.github.io
      - key: API_TOKEN
        generateValue: true
      - key: AUTO_REMINDER_MINUTES
        value: "1440"
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: reporte-desvios-db
          property: connectionString
      - key: RESEND_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SENDGRID_API_KEY
        value: disabled
      - key: MAIL_FROM
        sync: false

databases:
  - name: reporte-desvios-db
    plan: free
